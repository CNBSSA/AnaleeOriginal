name: CI

# Runs the test suite (incl. the canary smoke journey) on every push and PR.
# The suite is self-contained: tests/conftest.py provides DATABASE_URL (temp
# SQLite) and FLASK_SECRET_KEY and removes ANTHROPIC_API_KEY, so no secrets are
# needed. In CI the real flask_migrate/flask_apscheduler are installed, so the
# conftest's local stubs are not used.

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run test suite
        run: pytest tests/ -q
