{% extends "base.html" %}

{% block title %}Create Financial Goal{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h4 class="mb-0"><i class="fas fa-bullseye me-2"></i>Create Financial Goal</h4>
                </div>
                <div class="card-body">
                    <form method="POST" action="{{ url_for('main.create_goal') }}">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

                        <div class="mb-3">
                            <label for="name" class="form-label">Goal Name <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="name" name="name"
                                   placeholder="e.g. Emergency Fund" required maxlength="100">
                        </div>

                        <div class="mb-3">
                            <label for="description" class="form-label">Description</label>
                            <textarea class="form-control" id="description" name="description"
                                      rows="2" placeholder="Optional description"></textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="target_amount" class="form-label">Target Amount <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <span class="input-group-text">$</span>
                                    <input type="number" class="form-control" id="target_amount"
                                           name="target_amount" step="0.01" min="0.01" required
                                           placeholder="0.00">
                                </div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="current_amount" class="form-label">Current Amount</label>
                                <div class="input-group">
                                    <span class="input-group-text">$</span>
                                    <input type="number" class="form-control" id="current_amount"
                                           name="current_amount" step="0.01" min="0" value="0"
                                           placeholder="0.00">
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="category" class="form-label">Category</label>
                                <select class="form-select" id="category" name="category">
                                    <option value="">Select category...</option>
                                    <option value="savings">Savings</option>
                                    <option value="investment">Investment</option>
                                    <option value="debt_reduction">Debt Reduction</option>
                                    <option value="emergency_fund">Emergency Fund</option>
                                    <option value="retirement">Retirement</option>
                                    <option value="education">Education</option>
                                    <option value="property">Property</option>
                                    <option value="other">Other</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="deadline" class="form-label">Target Date</label>
                                <input type="date" class="form-control" id="deadline" name="deadline">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <div class="form-check mt-4">
                                    <input class="form-check-input" type="checkbox" id="is_recurring"
                                           name="is_recurring" value="1">
                                    <label class="form-check-label" for="is_recurring">
                                        Recurring goal
                                    </label>
                                </div>
                            </div>
                            <div class="col-md-6 mb-3" id="recurrence_period_group" style="display:none;">
                                <label for="recurrence_period" class="form-label">Recurrence Period</label>
                                <select class="form-select" id="recurrence_period" name="recurrence_period">
                                    <option value="monthly">Monthly</option>
                                    <option value="quarterly">Quarterly</option>
                                    <option value="annually">Annually</option>
                                </select>
                            </div>
                        </div>

                        <div class="d-flex gap-2 mt-3">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save me-1"></i> Create Goal
                            </button>
                            <a href="{{ url_for('main.goals_dashboard') }}" class="btn btn-secondary">
                                Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('is_recurring').addEventListener('change', function() {
    document.getElementById('recurrence_period_group').style.display =
        this.checked ? 'block' : 'none';
});
</script>
{% endblock %}
